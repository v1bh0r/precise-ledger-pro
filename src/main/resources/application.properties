# System Config - Common
quarkus.datasource.jdbc.url=jdbc:h2:mem:default;DB_CLOSE_DELAY=-1
quarkus.datasource.db-kind=h2
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api-specs
quarkus.quinoa.package-manager-install.node-version=20.14.0
quarkus.quinoa.package-manager-install.npm-version=v10.7.0
quarkus.quinoa.dev-server.port=3000
quarkus.quinoa.build-dir=dist
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=common
quarkus.http.access-log.category=access_log
quarkus.log.category."access_log".level=INFO
quarkus.log.category."io.quarkus".level=DEBUG
# System Config - Prod
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://34.131.89.55:5432/postgres
%prod.quarkus.datasource.username=postgres
%prod.quarkus.datasource.password=postgres
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.quinoa.enable-spa-routing=true