steps:
  - name: 'maven'
    entrypoint: 'mvn'
    args: [ 'clean', 'package', '-Dquarkus.container-image.build=true', '-Dquarkus.container-image.push=true', '-Dquarkus.container-image.name=asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy' ]
images:
  - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy'
options:
  logging: CLOUD_LOGGING_ONLY